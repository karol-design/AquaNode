# General
CONFIG_ASSERT=y
CONFIG_REBOOT=y
CONFIG_MAIN_STACK_SIZE=4096

# Serial & logging
CONFIG_LOG=y
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_LOG_TIMESTAMP_USE_REALTIME=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Enable the date-time library and automatic update on LTE connect (no regular updates)
CONFIG_DATE_TIME=y
CONFIG_DATE_TIME_MODEM=y
CONFIG_DATE_TIME_AUTO_UPDATE=y
CONFIG_DATE_TIME_TOO_OLD_SECONDS=0
CONFIG_DATE_TIME_UPDATE_INTERVAL_SECONDS=0

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_NATIVE=y
CONFIG_NET_UDP=y
CONFIG_NET_IPV4=y

# CoAP
CONFIG_COAP=y
CONFIG_COAP_CLIENT=y
CONFIG_COAP_CLIENT_THREAD_PRIORITY=10
CONFIG_COAP_CLIENT_MESSAGE_SIZE=1024
CONFIG_COAP_CLIENT_MESSAGE_HEADER_SIZE=64

# Sensors
CONFIG_GPIO=y
CONFIG_SENSOR=y
CONFIG_DS18B20=y
CONFIG_W1=y

# Reconfig the sample (longer breaks between CoAP reports)
# CONFIG_COAP_SAMPLE_REQUEST_INTERVAL_SECONDS=1800 # 30 minutes

# PSM and eDRX
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PSM_MODULE=y
CONFIG_LTE_LC_EDRX_MODULE=y
CONFIG_LTE_EDRX_REQ=y
CONFIG_LTE_PSM_REQ=y
CONFIG_LTE_PSM_REQ_RPTAU="00000001" # 10 minutes in sleep
CONFIG_LTE_PSM_REQ_RAT="00100010" # 2 minutes in active time

CONFIG_LTE_LC_MODEM_SLEEP_MODULE=y

# TAU pre warning (experimental only)
CONFIG_LTE_LC_TAU_PRE_WARNING_MODULE=y
CONFIG_LTE_LC_TAU_PRE_WARNING_TIME_MS=3000
CONFIG_LTE_LC_CELLULAR_PROFILE_MODULE=y
CONFIG_LTE_LC_PDN_MODULE=y
CONFIG_LTE_LC_RAI_MODULE=y

# Modem core
CONFIG_NRF_MODEM_LIB=y
CONFIG_MODEM_INFO=y
CONFIG_MODEM_INFO_ADD_NETWORK=y

CONFIG_CBPRINTF_FP_SUPPORT=y

# CONFIG_STACK_SENTINEL=y
# CONFIG_INIT_STACKS=y
# CONFIG_THREAD_STACK_INFO=y
# CONFIG_THREAD_ANALYZER=y
# CONFIG_THREAD_ANALYZER_AUTO=y
# CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=10

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
